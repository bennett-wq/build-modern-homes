<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f8f8"/>
      <stop offset="50%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d0d0d0" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <pattern id="blueprint" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="url(#grid)"/>
      <line x1="0" y1="100" x2="200" y2="100" stroke="#c8c8c8" stroke-width="0.8" opacity="0.3"/>
      <line x1="100" y1="0" x2="100" y2="200" stroke="#c8c8c8" stroke-width="0.8" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#blueprint)"/>
  <text x="50%" y="52%" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#999" font-weight="400" letter-spacing="0.5">
    Exterior render coming soon
  </text>
</svg>